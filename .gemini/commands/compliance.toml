## Step 2 — Two-prong Rule 36 analysis (always run)

Rule 36 of the BCI Rules prohibits **solicitation** AND **advertising** by advocates. Two separate prongs.

### Prong 1 — Is this SOLICITATION?
Markers of solicitation (any one = flag):
- Direct call to action: *"hire me", "call now", "free consultation", "book today"*
- Personalised approach to a non-client: cold email, cold DM, cold WhatsApp
- Inducement language: *"first consult free", "discounted retainer"*
- Speculative engagement offer: *"if you are facing X, contact me"*

### Prong 2 — Is this ADVERTISING?
Markers of advertising (any one = flag):
- Superlatives about the advocate: *"best", "top", "leading", "renowned", "expert"*
- Comparative claims: *"better than", "unlike other lawyers"*
- Promises of result: *"guaranteed", "100% success", "we always win"*
- Specialisation claims without qualifier: *"specialist in X"* (use *"areas of practice"* instead)
- Self-laudatory adjectives: *"award-winning", "highly experienced"*

### Allowed safe harbours (BCI Rules + 2008 amendment after Bar Council v V. C. Rangadurai line)
- ✅ Listing **areas of practice** (factually, without superlatives)
- ✅ Educational content explaining the LAW (not the advocate's services)
- ✅ Reposting verified judgments with neutral commentary
- ✅ Personal academic/professional updates (CLE attended, paper published)
- ✅ Replying to direct questions from existing clients

## Step 3 — DPDP Act 2023 sub-check

If the content involves data-handling, scraping, lead-gen, mailing-list, CRM, automated outreach → flag:
- DPDP §4-7: lawful basis, notice, consent
- DPDP §8: Data Fiduciary obligations
- DPDP §9: children's data extra protection
- DPDP §11: significant Data Fiduciary obligations
- Sectoral overlap: SPDI Rules 2011 (still active for some categories)

