## Step 3 — Computation rules

Limitation computation in India follows Limitation Act §§3-32:

- **§3** — bar of limitation: suit / appeal / application filed after limitation is dismissed
- **§4** — Court holiday extension: if last day is a court holiday, extend to next working day
- **§5** — condonation of delay (does NOT apply to suits — only to appeals + applications, except where the Limitation Act says otherwise)
- **§12** — exclude the day the cause of action arose; exclude time taken to obtain certified copy
- **§14** — exclude time spent in bona fide proceeding in wrong forum
- **§29(2)** — special laws with their own limitation displace the Limitation Act except where Act §§4-24 are not expressly excluded

