## Step 2 — Detect the draft type

Identify which kind of draft the advocate needs:
- **Pleadings:** Plaint · Written Statement · Replication · Counter-claim
- **Petitions:** Writ Petition (Art. 226 / 32) · Special Leave Petition · Review Petition · Curative Petition · Transfer Petition
- **Criminal pleadings:** Bail Application · Anticipatory Bail · 482 CrPC / 528 BNSS · Revision · Appeal
- **Civil applications:** Section 9 Arbitration · Section 11 Arbitration · Order 39 R.1-2 CPC · Order 1 R.10 CPC · O.7 R.11 CPC
- **Replies:** Reply to Show Cause · Reply to Notice · Reply to Affidavit
- **Affidavits:** Verification affidavit · Counter-affidavit · Rejoinder affidavit
- **Rent / tenancy:** State Rent Control Act eviction · standard-rent · rent-deposit
- **Tax:** Form 35 · Form 36 · CIT(A) appeal · ITAT appeal · Section 263 reply

## Step 3 — Wolfgang_rush plugin connection (v0.1 state)

The Wolfgang_rush drafting plugin family is a SEPARATE MIT-licensed plugin set (Supreme Court · Bombay HC · Rent Control · Tax). v0.1 of this firm only flags the connection; v0.2+ wires it up.

