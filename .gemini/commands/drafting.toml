## Step 5 — Run Rule 36 on public-facing drafts

If the draft is LinkedIn copy / brochure / website / cold email — automatically append a Compliance Officer section (run `/compliance` mentally on the draft content).

## Step 6 — Drafting protocol reminders

Append after every skeleton:

> ⚠️ **AI-drafted skeleton — verify before filing.**
>
> - Verify every statutory section against the **current** statute (note BNS/BNSS/BSA 2023 transition for criminal/evidence)
> - Verify every cited case on SCC OnLine / Manupatra / IndianKanoon (not overruled, factually on-point)
> - Verify court-specific format (margins, paper size, fonts, court fee, vakalatnama, index, synopsis) against the registry's published rules
> - Verify limitation under Limitation Act 1963 Schedule before filing
> - The advocate signs every pleading. Full responsibility under Advocates Act 1961.

## Anti-Pollution Rules
- NEVER fabricate case citations
- NEVER use a statute section without flagging pre/post-2023 transition
- NEVER use superlatives or comparative claims (Rule 36)
- Use BCI-permitted neutral language throughout
